<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>글로벌 스타트업 투자 정보</title>
<style>
  :root {
    --bg: #f7f8fa; --card: #ffffff; --text: #1a1f2e; --muted: #6b7280;
    --border: #e5e7eb; --accent: #2563eb; --accent-soft: #eff6ff;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: "Pretendard", -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
    background: var(--bg); color: var(--text); padding: 24px 16px;
  }
  .container { max-width: 1200px; margin: 0 auto; }
  header { display: flex; flex-wrap: wrap; align-items: baseline; gap: 12px; margin-bottom: 16px; }
  h1 { font-size: 1.5rem; }
  #last-updated { color: var(--muted); font-size: 0.85rem; }

  .controls { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; align-items: center; }
  select, #search {
    padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--card); font-size: 0.95rem;
  }
  select { cursor: pointer; }
  #search { flex: 1; min-width: 180px; max-width: 320px; }
  #result-count { color: var(--muted); font-size: 0.85rem; margin-left: auto; }

  .chip-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-bottom: 8px; }
  .chip-label { font-size: 0.8rem; color: var(--muted); width: 34px; flex-shrink: 0; }
  .chip {
    padding: 4px 12px; border: 1px solid var(--border); border-radius: 999px;
    background: var(--card); font-size: 0.82rem; cursor: pointer; user-select: none;
    transition: all 0.12s;
  }
  .chip:hover { border-color: var(--accent); }
  .chip.on { background: var(--accent); border-color: var(--accent); color: #fff; }
  .chip-clear { border: none; background: none; color: var(--muted); font-size: 0.8rem;
    cursor: pointer; text-decoration: underline; }
  .chips-wrap { margin-bottom: 14px; }

  .table-wrap {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  table { width: 100%; border-collapse: collapse; min-width: 880px; }
  th, td { padding: 12px 14px; text-align: left; font-size: 0.9rem; }
  th {
    background: #f9fafb; color: var(--muted); font-weight: 600;
    border-bottom: 1px solid var(--border); white-space: nowrap;
    position: sticky; top: 0; z-index: 1;
  }
  th.sortable { cursor: pointer; }
  th.sortable:hover { color: var(--accent); }
  th .arrow { font-size: 0.7rem; margin-left: 3px; }
  tbody tr { border-bottom: 1px solid var(--border); }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--accent-soft); cursor: pointer; }
  td.amount { font-variant-numeric: tabular-nums; font-weight: 600; white-space: nowrap; }
  td.company { font-weight: 600; }
  td.date { white-space: nowrap; color: var(--muted); }
  .tag {
    display: inline-block; padding: 2px 8px; border-radius: 999px;
    background: #f3f4f6; font-size: 0.8rem; white-space: nowrap;
  }
  .btn-summary {
    padding: 5px 12px; border: 1px solid var(--accent); border-radius: 6px;
    background: transparent; color: var(--accent); cursor: pointer; font-size: 0.82rem;
    white-space: nowrap;
  }
  .btn-summary:hover { background: var(--accent); color: #fff; }
  .empty { padding: 48px; text-align: center; color: var(--muted); }

  /* 모달 */
  #modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    z-index: 100; padding: 20px;
  }
  #modal-overlay.open { display: flex; align-items: center; justify-content: center; }
  #modal {
    background: var(--card); border-radius: 14px; max-width: 560px; width: 100%;
    max-height: 85vh; overflow-y: auto; padding: 24px;
  }
  #modal h2 { font-size: 1.2rem; margin-bottom: 4px; }
  #modal .meta { color: var(--muted); font-size: 0.85rem; margin-bottom: 14px; }
  #modal .summary { line-height: 1.65; margin-bottom: 16px; }
  #modal h3 { font-size: 0.9rem; color: var(--muted); margin: 14px 0 6px; }
  #modal ul { padding-left: 18px; line-height: 1.6; font-size: 0.9rem; }
  #modal a { color: var(--accent); word-break: break-all; font-size: 0.88rem; }
  #modal .close-row { text-align: right; margin-top: 18px; }
  #modal .close-row button {
    padding: 8px 18px; border: none; border-radius: 8px; background: var(--accent);
    color: #fff; cursor: pointer; font-size: 0.9rem;
  }

  @media (max-width: 640px) {
    body { padding: 14px 8px; }
    h1 { font-size: 1.2rem; }
    .controls { gap: 6px; }
    #search { max-width: none; }
    #result-count { width: 100%; margin-left: 0; }
    .chip-label { width: 100%; }
    th, td { padding: 9px 10px; font-size: 0.84rem; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>글로벌 스타트업 투자 정보</h1>
    <span id="last-updated"></span>
  </header>

  <div class="controls">
    <select id="year-select" aria-label="연도 선택"></select>
    <select id="month-select" aria-label="월 선택"></select>
    <input id="search" type="search" placeholder="기업명·투자사 검색">
    <span id="result-count"></span>
  </div>

  <div class="chips-wrap">
    <div class="chip-row" id="chips-region"><span class="chip-label">지역</span></div>
    <div class="chip-row" id="chips-sector"><span class="chip-label">분야</span></div>
    <div class="chip-row" id="chips-stage"><span class="chip-label">단계</span></div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="sortable" data-sort="date">일자<span class="arrow"></span></th>
          <th>기업명</th>
          <th>분야</th>
          <th class="sortable" data-sort="amount_usd">투자금 (USD)<span class="arrow"></span></th>
          <th>투자 단계</th>
          <th>투자사</th>
          <th>국가 (지역)</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="deals-body"></tbody>
    </table>
    <div id="empty-message" class="empty" style="display:none">조건에 맞는 데이터가 없습니다.</div>
  </div>
</div>

<div id="modal-overlay">
  <div id="modal" role="dialog" aria-modal="true">
    <h2 id="modal-company"></h2>
    <div class="meta" id="modal-meta"></div>
    <div class="summary" id="modal-summary"></div>
    <h3>투자사</h3>
    <ul id="modal-investors"></ul>
    <h3>원문 (출처)</h3>
    <div id="modal-sources"></div>
    <div class="close-row"><button id="modal-close">닫기</button></div>
  </div>
</div>

<script>
const DATA_BASE = "data";
let months = [];
let monthDeals = [];       // 현재 월 원본
let viewDeals = [];        // 필터·정렬 적용 후
const state = {
  search: "",
  filters: { region: new Set(), sector: new Set(), stage: new Set() },
  sort: { key: "date", dir: "desc" },
};

const fmtUSD = (n) => {
  if (n == null) return "비공개";
  if (n >= 1e9) return "$" + (n / 1e9).toFixed(n % 1e9 === 0 ? 0 : 1) + "B";
  if (n >= 1e6) return "$" + (n / 1e6).toFixed(n % 1e6 === 0 ? 0 : 1) + "M";
  if (n >= 1e3) return "$" + (n / 1e3).toFixed(0) + "K";
  return "$" + n;
};

const esc = (s) => (s ?? "").toString()
  .replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;")
  .replaceAll('"', "&quot;");

async function init() {
  let index;
  try {
    index = await (await fetch(`${DATA_BASE}/index.json`, { cache: "no-store" })).json();
  } catch {
    showEmpty("데이터를 불러올 수 없습니다.");
    return;
  }
  months = index.months || [];
  document.getElementById("last-updated").textContent =
    index.last_updated ? `마지막 업데이트: ${index.last_updated} KST` : "";

  const years = [...new Set(months.map(m => m.slice(0, 4)))];
  const yearSel = document.getElementById("year-select");
  yearSel.innerHTML = years.map(y => `<option value="${y}">${y}년</option>`).join("");
  yearSel.addEventListener("change", () => { fillMonths(); loadMonth(); });
  document.getElementById("month-select").addEventListener("change", loadMonth);

  let searchTimer;
  document.getElementById("search").addEventListener("input", (e) => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      state.search = e.target.value.trim().toLowerCase();
      render();
    }, 150);
  });

  document.querySelectorAll("th.sortable").forEach(th => {
    th.addEventListener("click", () => {
      const key = th.dataset.sort;
      if (state.sort.key === key) {
        state.sort.dir = state.sort.dir === "desc" ? "asc" : "desc";
      } else {
        state.sort = { key, dir: "desc" };
      }
      render();
    });
  });

  fillMonths();
  await loadMonth();
}

function fillMonths() {
  const year = document.getElementById("year-select").value;
  const monthSel = document.getElementById("month-select");
  const ms = months.filter(m => m.startsWith(year));
  monthSel.innerHTML = ms.map(m => `<option value="${m}">${parseInt(m.slice(5), 10)}월</option>`).join("");
}

async function loadMonth() {
  const month = document.getElementById("month-select").value;
  monthDeals = [];
  if (month) {
    try {
      const data = await (await fetch(`${DATA_BASE}/${month}.json`, { cache: "no-store" })).json();
      monthDeals = data.deals || [];
    } catch { /* 아래 empty 처리 */ }
  }
  // 필터 초기화 (월이 바뀌면 값 분포가 달라짐)
  state.filters.region.clear();
  state.filters.sector.clear();
  state.filters.stage.clear();
  buildChips();
  render();
}

function buildChips() {
  const groups = [
    ["region", "chips-region", d => d.region],
    ["sector", "chips-sector", d => d.sector],
    ["stage", "chips-stage", d => d.stage],
  ];
  for (const [key, elId, getter] of groups) {
    const el = document.getElementById(elId);
    el.querySelectorAll(".chip, .chip-clear").forEach(n => n.remove());
    const counts = new Map();
    for (const d of monthDeals) {
      const v = getter(d);
      if (v) counts.set(v, (counts.get(v) || 0) + 1);
    }
    const values = [...counts.keys()].sort((a, b) => counts.get(b) - counts.get(a));
    for (const v of values) {
      const chip = document.createElement("span");
      chip.className = "chip";
      chip.textContent = `${v} ${counts.get(v)}`;
      chip.addEventListener("click", () => {
        const set = state.filters[key];
        set.has(v) ? set.delete(v) : set.add(v);
        chip.classList.toggle("on");
        render();
      });
      el.appendChild(chip);
    }
    if (values.length) {
      const clear = document.createElement("button");
      clear.className = "chip-clear";
      clear.textContent = "초기화";
      clear.addEventListener("click", () => {
        state.filters[key].clear();
        el.querySelectorAll(".chip.on").forEach(c => c.classList.remove("on"));
        render();
      });
      el.appendChild(clear);
    }
  }
}

function applyFilters() {
  const { search, filters } = state;
  return monthDeals.filter(d => {
    if (filters.region.size && !filters.region.has(d.region)) return false;
    if (filters.sector.size && !filters.sector.has(d.sector)) return false;
    if (filters.stage.size && !filters.stage.has(d.stage)) return false;
    if (search) {
      const hay = [d.company, d.lead_investor, ...(d.investors || [])]
        .filter(Boolean).join(" ").toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });
}

function sortDeals(deals) {
  const { key, dir } = state.sort;
  const sign = dir === "desc" ? -1 : 1;
  return [...deals].sort((a, b) => {
    let av = a[key], bv = b[key];
    if (key === "amount_usd") {  // 비공개(null)는 항상 마지막
      if (av == null && bv == null) return 0;
      if (av == null) return 1;
      if (bv == null) return -1;
      return sign * (av - bv);
    }
    return sign * String(av).localeCompare(String(bv));
  });
}

function render() {
  viewDeals = sortDeals(applyFilters());
  const body = document.getElementById("deals-body");
  const empty = document.getElementById("empty-message");

  document.querySelectorAll("th.sortable").forEach(th => {
    th.querySelector(".arrow").textContent =
      th.dataset.sort === state.sort.key ? (state.sort.dir === "desc" ? "▼" : "▲") : "";
  });

  document.getElementById("result-count").textContent =
    monthDeals.length ? `${viewDeals.length} / ${monthDeals.length}건` : "";

  empty.style.display = viewDeals.length ? "none" : "block";
  body.innerHTML = viewDeals.map((d, i) => `
    <tr data-idx="${i}">
      <td class="date">${esc(d.date)}</td>
      <td class="company">${esc(d.company)}</td>
      <td><span class="tag">${esc(d.sector ?? "-")}</span></td>
      <td class="amount">${fmtUSD(d.amount_usd)}</td>
      <td>${esc(d.stage ?? "-")}</td>
      <td>${esc(d.lead_investor ?? (d.investors?.[0] ?? "-"))}${(d.investors?.length ?? 0) > 1 ? ` 외 ${d.investors.length - 1}곳` : ""}</td>
      <td>${esc(d.country ?? "-")}${d.region ? ` (${esc(d.region)})` : ""}</td>
      <td><button class="btn-summary">요약 보기</button></td>
    </tr>`).join("");
}

function showEmpty(msg) {
  const empty = document.getElementById("empty-message");
  empty.style.display = "block";
  empty.textContent = msg;
}

// 행 전체 클릭으로도 모달 오픈
document.getElementById("deals-body").addEventListener("click", (e) => {
  const tr = e.target.closest("tr[data-idx]");
  if (!tr) return;
  openModal(viewDeals[Number(tr.dataset.idx)]);
});

function openModal(d) {
  if (!d) return;
  document.getElementById("modal-company").textContent = d.company;
  document.getElementById("modal-meta").textContent =
    [d.date, d.sector, d.stage, fmtUSD(d.amount_usd), d.country].filter(Boolean).join(" · ");
  document.getElementById("modal-summary").textContent = d.ai_summary_ko || "(요약 없음)";
  document.getElementById("modal-investors").innerHTML =
    (d.investors?.length ? d.investors : ["비공개"])
      .map(v => `<li>${esc(v)}${v === d.lead_investor ? " (리드)" : ""}</li>`).join("");
  document.getElementById("modal-sources").innerHTML =
    (d.sources || []).map(s => `<div><a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.name)} ↗</a></div>`).join("") || "-";
  document.getElementById("modal-overlay").classList.add("open");
}

document.getElementById("modal-close").addEventListener("click", closeModal);
document.getElementById("modal-overlay").addEventListener("click", (e) => {
  if (e.target.id === "modal-overlay") closeModal();
});
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeModal(); });
function closeModal() { document.getElementById("modal-overlay").classList.remove("open"); }

init();
</script>
</body>
</html>
