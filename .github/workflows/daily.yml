name: Daily funding pipeline

# 매일 수집→추출→저장 후 GitHub Pages 배포
on:
  schedule:
    - cron: "0 22 * * *"   # 매일 UTC 22:00 = 한국시간 아침 7시
  workflow_dispatch: {}     # 수동 실행 허용

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline (collect → extract → store → export)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python pipeline.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/funding.db public/data
          if git diff --cached --quiet; then
            echo "변경된 데이터 없음 - 커밋 생략"
          else
            git commit -m "chore: daily data update $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
